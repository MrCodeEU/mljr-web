name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}
  # Triggered by mljr-data's CI after it commits a fresh generated/site-data.json,
  # so the homepage image gets rebuilt with the new embedded data.
  repository_dispatch:
    types: [mljr-data-updated]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/mrcodeeu/mljr-web

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [homepage, showcase, regex]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update mljr-data to latest
        if: matrix.project == 'homepage'
        run: git submodule update --remote mljr-data

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.project }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/${{ matrix.project }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.project }}
          cache-to: type=gha,mode=max,scope=${{ matrix.project }}

      - name: Map project to homelab service name
        id: svc
        run: |
          if [ "${{ matrix.project }}" == "showcase" ]; then
            echo "name=ui-showcase" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.project }}" == "homepage" ]; then
            echo "name=homepage" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ matrix.project }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger homelab deployment
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/MrCodeEU/homelab-automation/dispatches \
            -d "{\"event_type\": \"service-update\", \"client_payload\": {\"service\": \"${{ steps.svc.outputs.name }}\", \"tag\": \"latest\", \"environment\": \"production\"}}"
