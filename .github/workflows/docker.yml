name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      projects:
        description: 'Projects to build (comma-separated, or "all")'
        required: false
        default: 'all'
  # Triggered by mljr-data's CI after it commits a fresh generated/site-data.json,
  # so the homepage image gets rebuilt with the new embedded data.
  repository_dispatch:
    types: [mljr-data-updated]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/mrcodeeu/mljr-web

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine projects to build
        id: set
        run: |
          ALL='["homepage","showcase","regex","cron","codec"]'

          # mljr-data updated: only homepage embeds that data
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "matrix=[\"homepage\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Tag push or manual dispatch: honour input or build all
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            INPUT="${{ inputs.projects }}"
            if [ -z "$INPUT" ] || [ "$INPUT" == "all" ]; then
              echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
            else
              MATRIX=$(echo "$INPUT" | tr ',' '\n' | sed 's/[[:space:]]//g' | jq -R . | jq -sc .)
              echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Push event: diff against parent; fallback to all on first commit
          if ! CHANGED=$(git diff --name-only HEAD^ HEAD 2>/dev/null); then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Any change outside projects/ touches shared libs/assets → rebuild all
          if echo "$CHANGED" | grep -qvE '^projects/'; then
            echo "matrix=$ALL" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Collect only the affected project(s)
          PROJECTS=()
          for proj in homepage showcase regex cron codec; do
            if echo "$CHANGED" | grep -q "^projects/$proj/"; then
              PROJECTS+=("\"$proj\"")
            fi
          done

          if [ ${#PROJECTS[@]} -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[$(IFS=,; echo "${PROJECTS[*]}")]" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        project: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update mljr-data to latest
        if: matrix.project == 'homepage'
        run: git submodule update --remote mljr-data

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.project }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/${{ matrix.project }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.project }}
          cache-to: type=gha,mode=max,scope=${{ matrix.project }}

      - name: Map project to homelab service name
        id: svc
        run: |
          if [ "${{ matrix.project }}" == "showcase" ]; then
            echo "name=ui-showcase" >> "$GITHUB_OUTPUT"
          elif [ "${{ matrix.project }}" == "homepage" ]; then
            echo "name=homepage" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ matrix.project }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger homelab deployment
        if: github.ref == 'refs/heads/main' || github.event_name == 'repository_dispatch'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/MrCodeEU/homelab-automation/dispatches \
            -d "{\"event_type\": \"service-update\", \"client_payload\": {\"service\": \"${{ steps.svc.outputs.name }}\", \"tag\": \"latest\", \"environment\": \"production\"}}"
