version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errchkjson
    - errorlint
    - gosec
    - misspell
    - nilerr
    - nilnesserr
    - revive
    - unconvert
    - unparam
    - wastedassign
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
