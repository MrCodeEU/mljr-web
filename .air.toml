root = "."
tmp_dir = "bin/.air"

[build]
  pre_cmd = []
  cmd = "go build -tags=${AIR_BUILD_TAGS} -o bin/.air/app ${AIR_MAIN_PKG}"
  bin = "bin/.air/app"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_dir = ["ui", "internal", "projects"]
  exclude_dir = ["bin", "tools/icongen/.cache", ".git", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  delay = 200
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
